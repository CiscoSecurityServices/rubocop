# Bundler: all defaults


Gemspec/DeprecatedAttributeAssignment: # Checks that deprecated attributes are not set in a gemspec file
  Enabled: true
Gemspec/DevelopmentDependencies: # Enforce that development dependencies for a gem are specified in Gemfile, rather than in the gemspec using add_development_dependency
  Enabled: true
Gemspec/RequireMFA: # Don't require MFA to modify gems
  Enabled: false

Layout/EndOfLine:
  EnforcedStyle: lf
Layout/FirstHashElementIndentation:
  EnforcedStyle: consistent
Layout/LineLength:
  Max: 150
  IgnoreCopDirectives: true
Layout/MultilineMethodCallIndentation:
  EnforcedStyle: indented

Metrics: # We can judge when a block is too complex on our own
  Enabled: false

Style/Documentation: # Don't require comments on top of classes and modules
  Enabled: false
Style/CollectionMethods: # Consistent aliased methods e.g. map instead of collect
  Enabled: true
Style/EmptyMethod: # Require empty methods to span 2 lines
  EnforcedStyle: expanded
Style/OptionHash: # prefer explicitly named keyword parameters
  Enabled: true
Style/RegexpLiteral: # construct regexp with / /
  EnforcedStyle: slashes
  AllowInnerSlashes: true
Style/SymbolArray: # Don't allow constructing symbol arrays with %i
  EnforcedStyle: brackets
Style/WordArray: # Don't allow constructing string arrays with %w
  EnforcedStyle: brackets
Style/OpenStructUse: # Don't forbid using openstruct
  Enabled: false
Style/IfUnlessModifier: # Don't force use of one-line conditionals
  Enabled: false
Style/CommentAnnotation: # Don't require a colon in TODO comments
  RequireColon: false

Naming/VariableNumber: # Don't forbid use of numbers in variable names
  Enabled: false
